name: Publish Helm Charts

on:
  workflow_run:
    workflows: ["Build container image"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  CHARTS_REPO: ${{ github.repository_owner }}/charts

jobs:
  guard:
    name: Verify image build succeeded
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    outputs:
      tag: ${{ github.event.workflow_run.head_branch }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
    - name: Check image build result
      run: |
        if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
          echo "::error::Image build for tag ${{ github.event.workflow_run.head_branch }} did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}). Refusing to publish chart."
          exit 1
        fi
        echo "Image build succeeded for tag ${{ github.event.workflow_run.head_branch }}"

  publish-operator-crds-chart:
    name: Publish osac-operator-crds chart
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ needs.guard.outputs.sha }}

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.17.0

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

    - name: Extract version from tag
      id: version
      run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      env:
        TAG: ${{ needs.guard.outputs.tag }}

    - name: Package chart
      run: |
        helm package charts/operator-crds/ \
          --version "${{ steps.version.outputs.version }}" \
          --app-version "${{ steps.version.outputs.version }}"

    - name: Push chart to GHCR
      run: |
        helm push osac-operator-crds-${{ steps.version.outputs.version }}.tgz \
          oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}

  publish-operator-chart:
    name: Publish osac-operator chart
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ needs.guard.outputs.sha }}

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.17.0

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

    - name: Extract version from tag
      id: version
      run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      env:
        TAG: ${{ needs.guard.outputs.tag }}

    - name: Update image tag in values.yaml
      run: |
        sed -i "s/tag: latest/tag: v${{ steps.version.outputs.version }}/" charts/operator/values.yaml

    - name: Package chart
      run: |
        helm package charts/operator/ \
          --version "${{ steps.version.outputs.version }}" \
          --app-version "${{ steps.version.outputs.version }}"

    - name: Push chart to GHCR
      run: |
        helm push osac-operator-${{ steps.version.outputs.version }}.tgz \
          oci://${{ env.REGISTRY }}/${{ env.CHARTS_REPO }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [guard, publish-operator-crds-chart, publish-operator-chart]
    permissions:
      contents: write
    steps:
    - name: Create GitHub Release
      run: |
        gh release create "${TAG}" \
          --repo "${{ github.repository }}" \
          --title "osac-operator ${TAG}" \
          --generate-notes \
        || gh release edit "${TAG}" \
          --repo "${{ github.repository }}" \
          --title "osac-operator ${TAG}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ needs.guard.outputs.tag }}
