apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "osac-operator.fullname" . }}-storage-secrets-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
